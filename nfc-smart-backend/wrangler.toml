name = "nfc-smart-backend"
main = "src/index.ts"
compatibility_date = "2023-12-01"

[assets]
directory = "./frontend/dist"
binding = "ASSETS"
# Without this, "/" resolves to dist/index.html as a static file and never
# reaches the Worker, silently replacing the "Visita /t/<id-ristorante>"
# fallback message with the React shell (mock data, no restaurant context).
run_worker_first = ["/"]

# Secrets (SUPABASE_URL, SUPABASE_ANON_KEY, TELEGRAM_BOT_TOKEN) are set via
# `wrangler secret put <NAME>` — never stored in this file.
